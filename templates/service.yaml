apiVersion: v1
kind: Service
metadata:
  name: {{ include "solace-cache.fullname" . }}
  labels:
    {{- include "solace-cache.labels" . | nindent 4 }}
spec:
  # Headless service for StatefulSet DNS
  # Solace Cache only makes outbound connections - no inbound ports needed
  clusterIP: None
  selector:
    {{- include "solace-cache.selectorLabels" . | nindent 4 }}
