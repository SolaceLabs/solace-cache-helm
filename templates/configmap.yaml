apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "solace-cache.fullname" . }}-config
  labels:
    {{- include "solace-cache.labels" . | nindent 4 }}
data:
  config.txt: |
{{- if .Values.solaceCache.customConfig }}
{{ .Values.solaceCache.customConfig | indent 4 }}
{{- else }}
    ###############################################################################
    # Solace Cache Configuration
    # Generated by Helm chart
    ###############################################################################
    
    # Section: Connecting to the Solace message broker
    # The client username and password
    SESSION_USERNAME {{ .Values.solaceCache.broker.username }}
    {{- if .Values.solaceCache.broker.existingSecret }}
    # Password loaded from secret
    {{- else }}
    SESSION_PASSWORD {{ .Values.solaceCache.broker.password }}
    {{- end }}
    
    # The Solace message broker host entry or IP address
    # For fail-over support, a comma-separated list of hosts can be provided
    SESSION_HOST {{ .Values.solaceCache.broker.host }}
    
    # Message VPN
    SESSION_VPN_NAME {{ .Values.solaceCache.broker.vpn }}
    
    # Session Application Description (dynamically set per instance)
    SESSION_APPLICATION_DESCRIPTION __SESSION_APPLICATION_DESCRIPTION__
    
    {{- if .Values.solaceCache.broker.ssl.enabled }}
    # SSL/TLS Configuration
    SESSION_SSL_TRUST_STORE_DIR /home/solace/truststore
    {{- end }}
    
    # Cache instance name (dynamically set per instance by init container)
    CACHE_INSTANCE_NAME __CACHE_INSTANCE_NAME__
    
    {{- if .Values.solaceCache.distributedCacheName }}
    # Distributed cache name
    CACHE_DISTRIBUTED_CACHE_NAME {{ .Values.solaceCache.distributedCacheName }}
    {{- end }}
    
    # Logging configuration
    # API log level - logs from the messaging API
    CACHE_SDK_LOG_LEVEL {{ .Values.solaceCache.settings.sdkLogLevel }}
    
    # Cache log level - logs from the Solace Cache instance
    CACHE_LOG_LEVEL {{ .Values.solaceCache.settings.cacheLogLevel }}
    
    # Send logs to stdout rather than syslog
    CACHE_DISABLE_SYSLOG 1
    
    # Cache configuration
    # Add additional cache-specific parameters here as needed
    # Refer to Solace Cache documentation for available options
{{- end }}
